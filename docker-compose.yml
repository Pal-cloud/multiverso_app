services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: multiverso_backend
    env_file: .env
    ports:
      - "8000:8000"
    networks:
      - multiverso_net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: multiverso_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - multiverso_net
    restart: unless-stopped

networks:
  multiverso_net:
    driver: bridge
